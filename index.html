async function exportPDF(q){
    if(isEdit) toggleEdit();
    let fName = prompt("Tên file PDF:", "IPQC_REPORT_V6");
    if(!fName) return;
    document.body.classList.add('exporting');
    const container = document.getElementById('export-container');
    window.scrollTo(0, 0);
    const actualHeight = container.scrollHeight;
    const actualWidth = 450; 
    setTimeout(() => {
        html2canvas(container, {
            scale: q,
            useCORS: true,
            allowTaint: true,
            backgroundColor: "#f0f2f5",
            width: actualWidth,
            height: actualHeight,
            windowWidth: actualWidth,
            windowHeight: actualHeight,
            scrollX: 0,
            scrollY: 0,
            onclone: (clonedDoc) => {
                const el = clonedDoc.getElementById('export-container');
                el.style.height = 'auto';
                el.style.width = '450px';
                el.style.overflow = 'visible';
                el.style.margin = '0';
                el.style.boxShadow = 'none';
            }
        }).then(canvas => {
            const imgData = canvas.toDataURL('image/jpeg', 0.95);
            const imgW = 210; 
            const imgH = (canvas.height * imgW) / canvas.width;
            const pdf = new jspdf.jsPDF('p', 'mm', [imgW, imgH]);
            pdf.addImage(imgData, 'JPEG', 0, 0, imgW, imgH, null, 'FAST');
            pdf.save(fName + ".pdf");
            document.body.classList.remove('exporting');
        });
    }, 1000); 
}
